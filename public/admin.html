<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeaTok - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .admin-wrap { display: flex; min-height: 100vh; padding-top: var(--nav-h); }
    .admin-sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      position: fixed; top: var(--nav-h); left: 0; bottom: 0;
      overflow-y: auto; padding: 16px 0;
    }
    .admin-sidebar-logo {
      font-family: var(--font-brand); font-size: 1.1rem; font-weight: 700;
      color: var(--accent3); padding: 0 16px 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .admin-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; cursor: pointer; transition: var(--transition);
      font-size: 0.875rem; color: var(--text2); border-radius: 0;
    }
    .admin-nav-item:hover { background: var(--bg3); color: var(--text); }
    .admin-nav-item.active { background: rgba(124,58,237,0.15); color: var(--accent3); border-right: 2px solid var(--accent); }
    .admin-nav-item i { width: 18px; text-align: center; }
    .admin-content {
      flex: 1; margin-left: 240px; padding: 28px;
      min-height: calc(100vh - var(--nav-h));
    }
    .admin-page { display: none; }
    .admin-page.active { display: block; }
    .admin-page-title {
      font-family: var(--font-brand); font-size: 1.5rem; font-weight: 800;
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; text-align: center;
    }
    .stat-card-num { font-family: var(--font-brand); font-size: 2rem; font-weight: 800; }
    .stat-card-label { font-size: 0.78rem; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .admin-table-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .admin-table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;
    }
    .admin-table-title { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg3); padding: 12px 16px; text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .post-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--bg3); }
    .post-thumb-placeholder { width: 48px; height: 48px; border-radius: 8px; background: var(--bg4); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 1rem; }
    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; }
    .status-public { background: rgba(34,197,94,0.15); color: #86efac; }
    .status-private { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .status-hidden { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .status-banned { background: rgba(239,68,68,0.2); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .status-active { background: rgba(34,197,94,0.15); color: var(--green); }
    .td-actions { display: flex; gap: 6px; align-items: center; }
    .action-icon-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: var(--transition); }
    .action-icon-btn:hover { background: var(--bg4); color: var(--text); }
    .action-icon-btn.danger:hover { background: rgba(239,68,68,0.2); color: var(--red); border-color: rgba(239,68,68,0.4); }
    .action-icon-btn.warn:hover { background: rgba(245,158,11,0.2); color: var(--yellow); border-color: rgba(245,158,11,0.4); }
    .action-icon-btn.success:hover { background: rgba(34,197,94,0.2); color: var(--green); border-color: rgba(34,197,94,0.4); }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 14px; border-radius: var(--radius-sm); background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: 0.8rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .admin-search { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 0.875rem; padding: 8px 14px; outline: none; transition: var(--transition); }
    .admin-search:focus { border-color: var(--accent); }
    .bulk-bar {
      display: none; align-items: center; gap: 10px;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
      border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 14px;
    }
    .bulk-bar.show { display: flex; }
    .bulk-count { font-size: 0.875rem; font-weight: 600; color: var(--accent3); }
    .cat-form {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    }
    .cat-form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .cat-icon-preview { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .icon-picker-wrap { position: relative; }
    .icon-picker-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 500;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      display: grid; grid-template-columns: repeat(8, 36px);
      gap: 4px; max-height: 240px; overflow-y: auto;
      box-shadow: var(--shadow); display: none;
    }
    .icon-picker-dropdown.show { display: grid; }
    .icon-option { width: 36px; height: 36px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--text2); transition: var(--transition); }
    .icon-option:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .user-detail-panel {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-top: 16px;
    }
    .pagination { display: flex; align-items: center; gap: 6px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .page-btn { width: 32px; height: 32px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: var(--transition); }
    .page-btn:hover, .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-content { margin-left: 0; padding: 16px; }
      .cat-form-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="adminApp">
    <div class="splash">
      <div class="splash-logo">Admin</div>
    </div>
  </div>
  <script src="/admin.js"></script>
</body>
</html>
